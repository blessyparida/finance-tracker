server:
  port: 8080


spring:

  servlet:
    multipart:
      enabled: true

      max-file-size: 20MB

      max-request-size: 20MB

  datasource:
    url: jdbc:postgresql://localhost:5432/finance-db
    username: postgres
    password: gelhu@1234

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true


  batch:
    jdbc:
      initialize-schema: always

    job:
      enabled: false

  sql:
    init:
      mode: always


logging:
  level:

    org:
      springframework:
        security: INFO

    com:
      blessy: DEBUG